<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in with email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page" aria-hidden="true">
      <div class="clouds"></div>
      <div class="halo"></div>
    </div>

    <header class="top-brand">
      <div class="top-brand__mark" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path
            d="M3 11V3h5l2.2 2.2V11H3z"
            fill="#fff"
            fill-opacity="0.95"
          />
        </svg>
      </div>
      <span class="top-brand__name">SaaS</span>
    </header>

    <main class="main">
      <section class="card" aria-labelledby="login-title">
        <div class="card__badge" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect
              x="3.5"
              y="4"
              width="8"
              height="12"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M11.5 10h3.2M14.7 10l-1.4 1.4M14.7 10l-1.4-1.4"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
        </div>

        <h1 id="login-title" class="card__title">Sign in with email</h1>
        <p class="card__subtitle">
          Make a new start to bring your works, data, and teams together. For
          free
        </p>

        <form class="form" id="login-form" novalidate>
          <div class="field">
            <div class="input-shell">
              <span class="input-shell__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <circle
                    cx="9"
                    cy="6.5"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                  <path
                    d="M3.5 15.2c.9-2.6 3.3-4.2 5.5-4.2s4.6 1.6 5.5 4.2"
                    stroke="currentColor"
                    stroke-width="1.3"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="username"
                placeholder="Email"
                required
              />
            </div>
          </div>

          <div class="field">
            <div class="input-shell">
              <span class="input-shell__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <rect
                    x="4"
                    y="8"
                    width="10"
                    height="7.5"
                    rx="1.5"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                  <path
                    d="M6 8V6.2C6 4.4 7.5 3 9.2 3h0c1.8 0 3.2 1.4 3.2 3.2V8"
                    stroke="currentColor"
                    stroke-width="1.3"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Password"
                minlength="1"
                required
              />
              <button
                type="button"
                class="input-shell__eye"
                id="toggle-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg
                  class="icon-eye"
                  width="18"
                  height="18"
                  viewBox="0 0 18 18"
                  fill="none"
                >
                  <path
                    d="M2.5 9s2.8-4 6.5-4 6.5 4 6.5 4-2.8 4-6.5 4-6.5-4-6.5-4Z"
                    stroke="currentColor"
                    stroke-width="1.3"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="9"
                    cy="9"
                    r="2"
                    stroke="currentColor"
                    stroke-width="1.3"
                  />
                </svg>
                <svg
                  class="icon-eye-off"
                  width="18"
                  height="18"
                  viewBox="0 0 18 18"
                  fill="none"
                >
                  <path
                    d="M2.5 9s2.8-4 6.5-4c1.2 0 2.3.3 3.2.8M15.5 9s-1.1 1.6-2.8 2.8M3.5 14.5 14 3.5"
                    stroke="currentColor"
                    stroke-width="1.3"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="form__row">
            <a class="link-forgot" href="#">Forgot password?</a>
          </div>

          <p class="error" id="form-error" role="alert" hidden></p>

          <button type="submit" class="btn-primary">Get Started</button>
        </form>

        <p class="social-label">Or sign in with</p>
        <div class="social" role="group" aria-label="Social sign in">
          <button type="button" class="social__btn" aria-label="Continue with Google">
            <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
              <path
                fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6C43.08 37.55 46.98 31.76 46.98 24.55z"
              />
              <path
                fill="#FBBC05"
                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
              />
              <path
                fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
              />
              <path fill="none" d="M0 0h48v48H0z" />
            </svg>
          </button>
          <button type="button" class="social__btn" aria-label="Continue with Facebook">
            <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
              <circle cx="10" cy="10" r="10" fill="#1877F2" />
              <path
                fill="#fff"
                d="M11.3 17V10.2h2.3l.4-2.6h-2.7V6.1c0-.7.2-1.2 1.2-1.2h1.3V2.5h-2c-2.4 0-3.4 1.1-3.4 3.1V7.6H5.5v2.6h2.3V17h3.5Z"
              />
            </svg>
          </button>
          <button type="button" class="social__btn" aria-label="Continue with Apple">
            <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
              <circle cx="10" cy="10" r="10" fill="#111" />
              <path
                fill="#fff"
                d="M13.1 6.3c-.4.5-1.1.9-1.8.8-.1-.7.3-1.4.7-1.8.4-.5 1.2-.9 1.8-.8.1.7-.2 1.4-.7 1.8Zm.7 1.2c-.9 0-1.7.5-2.2.5-.6 0-1.4-.5-2.3-.5-1.2 0-2.3.7-2.9 1.8-1.2 2.1-.3 5.3.9 7 .6.9 1.3 1.8 2.2 1.8.8 0 1.1-.5 2.1-.5 1 0 1.2.5 2.1.5.9 0 1.5-.8 2.1-1.7.7-.9 1-1.9 1-2-.1 0-1.9-.7-1.9-2.8 0-1.8 1.5-2.6 1.6-2.7-.9-1.3-2.3-1.4-2.7-1.4Z"
              />
            </svg>
          </button>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
