# Dark-first HDFC assistant UI (matches Groww-inspired hierarchy: deep canvas + teal accent)

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
enableWebsocketCompression = true
maxUploadSize = 50
maxMessageSize = 50
fileWatcherType = "none"

[browser]
gatherUsageStats = false
showErrorDetails = false

[runner]
fastReruns = true
magicEnabled = false

[theme]
base = "dark"
primaryColor = "#4ECDC4"
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#111827"
textColor = "#E5E7EB"
font = "sans serif"

[logger]
level = "warning"
messageFormat = "%(asctime)s %(message)s"

[client]
showErrorDetails = false
