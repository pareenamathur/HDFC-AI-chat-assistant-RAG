# Corpus manifest freshness — stdlib only (no pip / requirements.txt).
# Scheduled workflows run only from the repository DEFAULT branch (e.g. main).
name: Corpus health check

on:
  schedule:
    - cron: "30 4 * * *" # ~10:00 IST
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "data/corpus_version.json"
      - ".github/workflows/corpus-health-check.yml"

permissions:
  contents: read

concurrency:
  group: corpus-health-${{ github.ref }}
  cancel-in-progress: true

env:
  STALE_THRESHOLD_DAYS: "30"

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify corpus_version.json freshness
        run: |
          python3 << 'PY'
          import json
          import datetime
          import os
          import sys

          threshold = int(os.environ.get("STALE_THRESHOLD_DAYS", "30"))
          path = "data/corpus_version.json"

          try:
              with open(path, encoding="utf-8") as f:
                  manifest = json.load(f)
          except FileNotFoundError:
              print(f"::error::Missing {path} — commit data/corpus_version.json from the Phase 1 pipeline.")
              sys.exit(1)

          raw = manifest.get("last_updated")
          if not raw:
              print("::error::corpus_version.json has no last_updated field")
              sys.exit(1)

          try:
              last = datetime.datetime.fromisoformat(str(raw).replace("Z", "+00:00"))
          except ValueError as e:
              print(f"::error::Invalid last_updated ISO datetime: {raw!r} ({e})")
              sys.exit(1)

          if last.tzinfo is None:
              last = last.replace(tzinfo=datetime.timezone.utc)

          now = datetime.datetime.now(datetime.timezone.utc)
          age_days = (now - last).days

          print(f"last_updated={last.isoformat()} age_days={age_days} threshold={threshold}")

          if age_days > threshold:
              print(
                  f"::error::Corpus manifest is stale ({age_days} days > {threshold}). "
                  "Re-run Phase 1 fetch→chunk, rebuild Chroma, commit data/, and redeploy."
              )
              sys.exit(1)

          print("::notice::Corpus manifest is within freshness threshold")
          PY
