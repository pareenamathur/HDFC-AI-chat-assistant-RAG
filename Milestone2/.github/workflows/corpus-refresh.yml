name: Corpus Refresh Pipeline

# Scheduled monthly refresh + manual trigger
on:
  schedule:
    # 1st of every month at 10:00 AM IST (4:30 AM UTC)
    - cron: '30 4 1 * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force full refresh even if corpus is fresh'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  PYTHON_VERSION: '3.12'
  CHROMADB_DIR: './data/indexed'

jobs:
  # ------------------------------------------------------------------
  # Phase 1.1 — Fetch
  # ------------------------------------------------------------------
  fetch:
    name: 1.1 Fetch URLs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install fetcher dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fetcher (Phase 1.1)
        run: |
          cd phase1_ingestion_corpus_build/subphase1.1_fetcher/src
          python run_fetcher.py

      - name: Upload fetched HTML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fetched-html
          path: data/html/*.html
          retention-days: 7

      - name: Upload fetcher logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetcher-logs
          path: phase1.1_run.log
          retention-days: 7

  # ------------------------------------------------------------------
  # Phase 1.2 — Extract
  # ------------------------------------------------------------------
  extract:
    name: 1.2 Extract Text
    runs-on: ubuntu-latest
    needs: fetch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fetched HTML artifacts
        uses: actions/download-artifact@v4
        with:
          name: fetched-html
          path: data/html/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install extractor dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Extractor (Phase 1.2)
        run: |
          cd phase1_ingestion_corpus_build/subphase1.2_extractor/src
          python run_extractor.py

      - name: Upload extracted data artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-data
          path: data/processed/extracted_data_phase1.2.json
          retention-days: 7

  # ------------------------------------------------------------------
  # Phase 1.3 — Clean & Normalize
  # ------------------------------------------------------------------
  clean:
    name: 1.3 Clean & Normalize
    runs-on: ubuntu-latest
    needs: extract
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download extracted data artifact
        uses: actions/download-artifact@v4
        with:
          name: extracted-data
          path: data/processed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install cleaner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Cleaner (Phase 1.3)
        run: |
          cd phase1_ingestion_corpus_build/subphase1.3_cleaner_normalizer/src
          python run_cleaner.py

      - name: Upload cleaned data artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-data
          path: data/processed/cleaned_data_phase1.3.json
          retention-days: 7

  # ------------------------------------------------------------------
  # Phase 1.4 — Chunk
  # ------------------------------------------------------------------
  chunk:
    name: 1.4 Chunk Text
    runs-on: ubuntu-latest
    needs: clean
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cleaned data artifact
        uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: data/processed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install chunker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Chunker (Phase 1.4)
        run: |
          cd phase1_ingestion_corpus_build/subphase1.4_chunker/src
          python run_chunker.py

      - name: Upload chunked data artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunked-data
          path: data/processed/chunked_data_phase1.4.json
          retention-days: 7

  # ------------------------------------------------------------------
  # Phase 1.5 — Embed
  # ------------------------------------------------------------------
  embed:
    name: 1.5 Generate Embeddings
    runs-on: ubuntu-latest
    needs: chunk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download chunked data artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-data
          path: data/processed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install embedder dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Embedder (Phase 1.5)
        run: |
          cd phase1_ingestion_corpus_build/subphase1.5_embedder/src
          python run_embedder.py

      - name: Upload embedded data artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedded-data
          path: data/processed/embedded_data_phase1.5.json
          retention-days: 7

  # ------------------------------------------------------------------
  # Phase 1.6 — Index
  # ------------------------------------------------------------------
  index:
    name: 1.6 Index into ChromaDB
    runs-on: ubuntu-latest
    needs: embed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download embedded data artifact
        uses: actions/download-artifact@v4
        with:
          name: embedded-data
          path: data/processed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install indexer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Indexer (Phase 1.6)
        run: |
          cd phase1_ingestion_corpus_build/subphase1.6_indexer/src
          python run_indexer.py

      - name: Upload ChromaDB indexed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromadb-indexed
          path: data/indexed/**
          retention-days: 30

  # ------------------------------------------------------------------
  # Validation & Commit
  # ------------------------------------------------------------------
  validate-and-commit:
    name: Validate & Commit Updated Corpus
    runs-on: ubuntu-latest
    needs: index
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ChromaDB indexed data
        uses: actions/download-artifact@v4
        with:
          name: chromadb-indexed
          path: data/indexed/

      - name: Download processed data files
        uses: actions/download-artifact@v4
        with:
          name: embedded-data
          path: data/processed/

      - name: Download chunked data
        uses: actions/download-artifact@v4
        with:
          name: chunked-data
          path: data/processed/

      - name: Download cleaned data
        uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: data/processed/

      - name: Download extracted data
        uses: actions/download-artifact@v4
        with:
          name: extracted-data
          path: data/processed/

      - name: Run validation tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          cd phase1_ingestion_corpus_build/subphase1.5_embedder/tests
          pytest test_embedder.py -v
          cd ../../subphase1.6_indexer/tests
          pytest test_indexer.py -v

      - name: Generate corpus version manifest
        run: |
          python -c "
          import json, datetime
          manifest = {
              'version': f\"corpus-v{datetime.datetime.now(datetime.timezone.utc).strftime('%Y.%m.1')}\",
              'last_updated': datetime.datetime.now(datetime.timezone.utc).isoformat(),
              'phases_run': ['1.1', '1.2', '1.3', '1.4', '1.5', '1.6'],
              'source': 'github_actions_scheduled'
          }
          with open('data/corpus_version.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print('Generated corpus version manifest')
          "

      - name: Commit updated corpus files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indexed/ data/processed/ data/corpus_version.json
          git diff --cached --quiet || git commit -m "chore: monthly corpus refresh $(date -u +%Y-%m-%d)"
          git tag "corpus-v$(date -u +%Y.%m.1)"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin --tags

      - name: Upload final corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-corpus-package
          path: |
            data/indexed/**
            data/processed/*
            data/corpus_version.json
          retention-days: 90
