# Monthly NAV corpus refresh: fetch Groww HTML → chunk → Chroma (MiniLM) → commit data/
name: Corpus refresh

on:
  schedule:
    - cron: "30 4 1 * *" # ~10:00 IST, 1st of month
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: corpus-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run full corpus refresh
        run: python scripts/run_corpus_refresh.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/html/ data/processed/ data/indexed/ data/corpus_version.json
          if git diff --cached --quiet; then
            echo "::notice::No data changes to commit"
            exit 0
          fi
          git commit -m "chore: automated corpus refresh $(date -u +%Y-%m-%d)"
          git push
