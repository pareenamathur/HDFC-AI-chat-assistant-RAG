[phases.setup]
nixPkgs = ["python311"]

[phases.build]
cmds = [
  "pip install --upgrade pip",
  "pip install -r Milestone2/requirements.txt"
]

[start]
cmd = "cd Milestone2 && uvicorn phase3_reasoning_guardrails.src.api:app --host 0.0.0.0 --port $PORT"

[variables]
PORT = "8000"
PYTHONUNBUFFERED = "1"
