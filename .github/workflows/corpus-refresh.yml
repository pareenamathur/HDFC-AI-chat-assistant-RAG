# Monthly NAV refresh: fetch → chunk → Chroma (MiniLM, same as Railway RAG).
name: Corpus refresh

on:
  schedule:
    - cron: "30 4 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: corpus-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run full corpus refresh (MiniLM Chroma)
        run: python scripts/run_corpus_refresh.py
        working-directory: Milestone2

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Milestone2/data/html/ Milestone2/data/processed/ Milestone2/data/indexed/ Milestone2/data/corpus_version.json
          if git diff --cached --quiet; then
            echo "::warning::No file changes detected — fetch may have returned identical HTML."
            exit 0
          fi
          git commit -m "chore: automated corpus refresh $(date -u +%Y-%m-%d)"
          git push origin HEAD
